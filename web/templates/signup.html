<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grain Ledger — Create account</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand"><span class="brand-mark"></span>GRAIN LEDGER</div>
      <p class="tagline">CREATE AN AGENT ACCOUNT</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <form method="post" action="{{ url_for('signup') }}">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" value="{{ username or '' }}" autocomplete="username" required
            autofocus>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required>
          <p class="hint">At least 8 characters.</p>
        </div>
        <div class="field">
          <label for="confirm_password">Confirm password</label>
          <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" minlength="8"
            required>
        </div>
        <button type="submit">Create account</button>
      </form>

      <div class="demo-accounts">
        Already have an account? <a href="{{ url_for('login') }}">Log in</a>.<br>
      </div>
    </div>
  </div>
</body>

</html>
