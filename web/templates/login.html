<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grain Ledger — Log in</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand"><span class="brand-mark"></span>GRAIN LEDGER</div>
      <p class="tagline">PROCUREMENT &amp; MANUAL PAYMENT WORKFLOW</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <form method="post" action="{{ url_for('login') }}">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit">Log in</button>
      </form>



      <p style="text-align:center; margin-top: 18px; font-size: 13px;">
        New purchase agent? <a href="{{ url_for('signup') }}">Create an account</a>
      </p>
    </div>
  </div>
</body>

</html>
